<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="../../../media/favicon.png">
    <title>Poster ansehen | Wenn Zeit über Leben entscheidet</title>
  <style>
    :root {
      --bg:#080c12; --panel:#0d131d; --text:#edf4ff; --muted:#a8b6c9;
      --line:#26354b; --cyan:#78d7ff; --violet:#9d8cff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);display:grid;grid-template-rows:auto 1fr}
    a{color:inherit;text-decoration:none}
    .topbar{background:rgba(8,12,18,.96);border-bottom:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}
    .title{font-weight:850;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .btn{display:inline-flex;align-items:center;justify-content:center;border:1px solid #435a78;padding:8px 13px;border-radius:9px;font-weight:800;background:#101827;white-space:nowrap}
    .btn.primary{background:linear-gradient(135deg,var(--cyan),var(--violet));color:#06101b;border:0}
    .viewer{min-height:0;background:#111827}
    .viewer iframe{width:100%;height:100%;border:0;background:#1f2937}
    .fallback{padding:24px;color:var(--muted)}
    .fallback a{color:var(--cyan);font-weight:800}
    @media(max-width:720px){.topbar{align-items:flex-start;flex-direction:column}.actions{width:100%;justify-content:flex-start}.btn{flex:1 1 auto}.title{white-space:normal}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">Wenn Zeit über Leben entscheidet · Poster-PDF</div>
    <nav class="actions" aria-label="PDF-Aktionen">
      <a class="btn" href="index.html">Zurück</a>
      <a class="btn primary" href="Umsetzung_vol2.pdf" download>Download</a>
      <a class="btn" href="Umsetzung_vol2.pdf" target="_blank" rel="noopener">Im Browser öffnen</a>
    </nav>
  </header>
  <main class="viewer">
    <iframe src="Umsetzung_vol2.pdf#view=FitH" title="PDF-Viewer für das Poster Wenn Zeit über Leben entscheidet">
      <div class="fallback">
        Der PDF-Viewer konnte nicht geladen werden.
        <a href="Umsetzung_vol2.pdf">PDF direkt öffnen</a>
      </div>
    </iframe>
  </main>
</body>
</html>
