<svg width="100%" viewBox="0 0 680 634" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Technische Architektur eines Leitstellen-Software-Pakets</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Diagramm zeigt die Pipeline von Notruf-Eingang über eine CTI-Schnittstelle mit SIPREC-Aufzeichnung, ein Einsatzleitsystem (CAD) mit Einsatzakte, ein API-Gateway/Middleware mit loser Kopplung, bis zu sechs über das Adapter-Pattern angebundenen Fachsystemen (NORA, KATWARN, NINA, KatRetter, Alarmdispatcher, Patientenakte), jeweils mit Angabe des adressierten Empfängers: allgemeine Bevölkerung, hinterlegte Ersthelfer, Einsatzkräfte/Rettungsmittel sowie Telenotarzt und Klinik.</desc>
