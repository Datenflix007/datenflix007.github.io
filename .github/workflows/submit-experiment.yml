name: Submit AlltagsLabor experiment

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action: create, edit, delete"
        required: true
        type: string
      language:
        description: "Language key, e.g. de, eng, fr, ru, uk, fa, pol, rum, es"
        required: true
        type: string
      experiment_json:
        description: "Experiment object as JSON. Empty object is okay for delete."
        required: true
        type: string
      target_experiment_id:
        description: "Existing experiment id for edit/delete"
        required: false
        type: string
      target_experiment_title:
        description: "Existing experiment title for edit/delete fallback"
        required: false
        type: string
      submitter:
        description: "Submitter account or identifier"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  apply-and-open-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out data repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate inputs and update experiment data
        env:
          SUBMISSION_ACTION: ${{ inputs.action }}
          SUBMISSION_LANGUAGE: ${{ inputs.language }}
          EXPERIMENT_JSON: ${{ inputs.experiment_json }}
          TARGET_EXPERIMENT_ID: ${{ inputs.target_experiment_id }}
          TARGET_EXPERIMENT_TITLE: ${{ inputs.target_experiment_title }}
        run: node scripts/append-experiment.mjs

      - name: Prepare pull request metadata
        id: meta
        env:
          SUBMISSION_ACTION: ${{ inputs.action }}
          EXPERIMENT_JSON: ${{ inputs.experiment_json }}
          SUBMISSION_LANGUAGE: ${{ inputs.language }}
          TARGET_EXPERIMENT_ID: ${{ inputs.target_experiment_id }}
          TARGET_EXPERIMENT_TITLE: ${{ inputs.target_experiment_title }}
          SUBMITTER: ${{ inputs.submitter }}
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync } from "node:fs";

          const action = process.env.SUBMISSION_ACTION || "create";
          const experiment = JSON.parse(process.env.EXPERIMENT_JSON || "{}");
          const label = experiment.title || process.env.TARGET_EXPERIMENT_TITLE || process.env.TARGET_EXPERIMENT_ID || "experiment";
          const slug = String(label)
            .normalize("NFKD")
            .replace(/[^\w\s-]/g, "")
            .trim()
            .replace(/\s+/g, "-")
            .toLowerCase()
            .slice(0, 60) || "experiment";
          const date = new Date().toISOString().slice(0, 10);
          const branch = `submission/${action}/${date}-${slug}`;
          const actionLabels = {
            create: "Neues Experiment",
            edit: "Experiment bearbeiten",
            delete: "Experiment loeschen"
          };

          const body = [
            "Automatisch aus der AlltagsLabor-Einpflegemaske erzeugt.",
            "",
            `- Aktion: ${action}`,
            `- Sprache: ${process.env.SUBMISSION_LANGUAGE}`,
            `- Ziel-ID: ${process.env.TARGET_EXPERIMENT_ID || "nicht angegeben"}`,
            `- Ziel-Titel: ${process.env.TARGET_EXPERIMENT_TITLE || "nicht angegeben"}`,
            `- Fach: ${experiment.subject || "nicht angegeben"}`,
            `- Klassenstufe: ${experiment.gradeLevel || "nicht angegeben"}`,
            `- Schulform: ${experiment.schoolType || "nicht angegeben"}`,
            `- Einreicherkennung: ${process.env.SUBMITTER || "nicht angegeben"}`,
            "",
            "Bitte Inhalt, Formatierung, Medienpfade und fachliche Korrektheit vor dem Merge pruefen."
          ].join("\n");

          appendFileSync(process.env.GITHUB_OUTPUT, `title=${actionLabels[action] || "Experiment"}: ${label}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, `branch=${branch}\n`);
          appendFileSync(process.env.GITHUB_OUTPUT, "body<<PR_BODY\n" + body + "\nPR_BODY\n");
          NODE

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.meta.outputs.branch }}
          base: main
          title: ${{ steps.meta.outputs.title }}
          body: ${{ steps.meta.outputs.body }}
          commit-message: ${{ steps.meta.outputs.title }}
          labels: automated-submission
          delete-branch: true
